<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empresa</title>

    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #e3efff;
            --card-bg: #f5f9ff;
            --border-color: #c5d9f1;
            --text-color: #5b7da1;
            --input-focus: #8fb8e6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: #ffffff99;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-title {
            background-color: #a3c4f3;
            color: #547294;
            padding: 8px 40px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
            border: 1px solid #8baad6;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            color: var(--text-color);
            font-weight: 600;
            font-size: 14px;
            margin-left: 10px;
        }

        input {
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 15px;
            font-family: inherit;
            color: #547294;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--input-focus);
        }

        .btn-submit {
            background-color: white;
            border: 2px solid var(--input-focus);
            color: var(--text-color);
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: var(--bg-color);
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="form-container">

    <header>
        <div class="form-title">Nueva Empresa</div>
    </header>

    <!-- CAMBIO IMPORTANTE -->
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" name="nombre" required placeholder="Ej: TechSecure SAS">
        </div>

        <div class="form-group">
            <label>NIT:</label>
            <input type="text" name="nit" required placeholder="900.000.000-1">
        </div>

        <div class="form-group">
            <label>Categoría:</label>
            <input type="text" name="categoria" placeholder="Ej: Tecnología">
        </div>

        <div class="form-group">
            <label>Representante Legal:</label>
            <input type="text" name="representante_legal" placeholder="Nombre completo">
        </div>

        <div class="form-group">
            <label>Fecha de Registro:</label>
            <input type="date" name="fecha_registro">
        </div>

        <button type="submit" class="btn-submit">Guardar Empresa</button>

    </form>

    <!-- URL DJANGO -->
    <a href="{% url 'menu' %}" class="back-link">← Volver al menú</a>

</div>

</body>
</html>
