<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Menú Principal - Seguridad de la Información</title>

    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #e3efff;
            --card-bg: #f5f9ff;
            --border-color: #c5d9f1;
            --text-color: #5b7da1;
            --btn-border: #8fb8e6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-container {
            background-color: #ffffff99;
            border: 2px solid var(--border-color);
            border-radius: 40px;
            padding: 40px;
            width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-title {
            background-color: #a3c4f3;
            color: #547294;
            padding: 10px 60px;
            border-radius: 25px;
            display: inline-block;
            font-weight: 600;
            border: 1px solid #8baad6;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        .card {
            background-color: #e2f3ff;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .welcome-section {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-color);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .user-icon {
            background-color: #c8e6f8;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .btn-menu {
            background-color: white;
            border: 2px solid var(--btn-border);
            color: var(--text-color);
            padding: 12px 20px;
            border-radius: 30px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: block;
        }

        .btn-menu:hover {
            background-color: var(--bg-color);
            transform: translateY(-2px);
        }

        .info-box {
            background-color: white;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .iso-badge {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-color);
        }

        .badge.active {
            background-color: #8fb8e6;
            color: white;
        }

        .info-text {
            font-size: 14px;
            color: var(--text-color);
            font-weight: 600;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .btn-logout {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 25px;
            border: 2px solid #ffbcc2;
            background: white;
            color: #9a5a5a;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background-color: #ffbcc2;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 188, 194, 0.3);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div style="position:absolute; top:20px; right:30px;">
            <a href="{% url 'logout' %}" class="btn-logout">Cerrar sesión</a>
        </div>

        <header>
            <div class="menu-title">Menú</div>
        </header>


        <div class="grid-layout">

            <!-- IZQUIERDA -->
            <div class="card">

                <div class="welcome-section">
                    <div class="user-icon">👤</div>
                    <span>¡Bienvenido!</span>
                </div>

                <!-- Django URLs -->
                <a href="{% url 'crear_empresa' %}" class="btn-menu">
                    Agregar empresa
                </a>

                <a href="{% url 'lista_empresas' %}" class="btn-menu">
                    Ver empresas
                </a>
                <a href="{% url 'lista_maestra' %}" class="btn-menu">
                    Lista Maestra de Documentos
                </a>

            </div>

            <!-- DERECHA -->
            <div class="right-column">

                <div class="card" style="margin-top: 30px;">
                    <div class="info-box">

                        <div class="iso-badge">
                            <span class="badge" style="background: #f0f9ff;">ISO</span>
                            <span class="badge" style="background: #cbeaff;">27001</span>
                            <span class="badge active">CONTROL</span>
                        </div>

                        <div class="info-text">
                            Soluciones digitales para la seguridad de la información
                        </div>

                    </div>
                </div>

            </div>

        </div>

    </div>


</body>

</html>
